<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo Test 4</title>
  <style>
    body {
      margin: 0;
      background: #120b08;
      display: flex;
      justify-content: center;
      padding: 16px;
      font-family: Inter, system-ui, sans-serif;
    }
    .canvas {
      position: relative;
      width: min(555px, 100%);
      max-width: 555px;
      aspect-ratio: 555 / 1200;
      background: url('./assets/test2-screenshot.jpg') top center/contain no-repeat;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.42);
      border: 1px solid rgba(255,255,255,.08);
    }
    .logo-group {
      position: absolute;
      left: 44px;
      top: 96px;
      width: 118px;
      height: 78px;
    }
    .heart {
      position: absolute;
      left: 0;
      top: 0;
      width: 62px;
      height: 62px;
      background: url('./assets/branding/white-MH-heart-arrow-transparent.png') center/contain no-repeat;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,.32));
    }
    .logo-line {
      position: absolute;
      font-family: "Segoe Script", "Brush Script MT", cursive;
      font-weight: 400;
      font-style: normal;
      color: #f5f2ea;
      text-shadow:
        1px 0 0 rgba(120, 68, 32, 0.45),
        -1px 0 0 rgba(120, 68, 32, 0.45),
        0 1px 0 rgba(120, 68, 32, 0.45),
        0 -1px 0 rgba(120, 68, 32, 0.45),
        0 2px 8px rgba(0,0,0,.36);
      line-height: 1;
      white-space: nowrap;
      transform: translate(-100%, -50%);
      text-align: right;
      user-select: none;
      pointer-events: none;
      font-size: 17px;
    }
    .line1 {
      left: 107px;
      top: 33px;
    }
    .line2 {
      left: 88px;
      top: 50px;
    }
    .note {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      max-width: 520px;
      margin: 0 auto;
      background: rgba(17,12,9,.88);
      color: rgba(245,242,234,.8);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="logo-group">
      <div class="heart"></div>
      <div class="logo-line line1">Vital &amp; Strong</div>
      <div class="logo-line line2">w/ Paul</div>
    </div>
  </div>
  <div class="note">Test 4 renders the saved Test 3 values as a plain view page, without editor handles.</div>
</body>
</html>
